<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Map Loop</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top, #f7e6c6, transparent 45%),
          linear-gradient(180deg, #ceb27b 0%, #8f6f42 100%);
        color: #23170d;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 16px;
        max-width: 1280px;
        margin: 0 auto;
        padding: 16px;
        box-sizing: border-box;
        align-items: start;
        min-height: 100vh;
      }

      #app[data-layout-mode="mobile"] {
        grid-template-columns: 1fr;
      }

      #app[data-sidebar-placement="bottom"] .sidebar {
        order: 2;
      }

      .panel {
        border: 2px solid rgba(35, 23, 13, 0.25);
        background: rgba(255, 248, 230, 0.88);
        border-radius: 14px;
        box-shadow: 0 12px 32px rgba(35, 23, 13, 0.18);
      }

      .game-surface-panel {
        padding: 12px;
        min-width: 0;
        overflow: hidden;
      }

      .game-canvas-row {
        display: flex;
        align-items: stretch;
        gap: 8px;
        min-width: 0;
      }

      .game-canvas-row canvas {
        flex: 1 1 auto;
        min-width: 0;
      }

      .scene-action-mount {
        display: flex;
        flex: 0 0 auto;
      }

      .map-action-bar {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 48px;
      }

      .map-action-icon {
        width: 44px;
        min-width: 44px;
        height: 44px;
        min-height: 44px;
        padding: 0;
        font-size: 1.4rem;
        line-height: 1;
      }

      .scene-below-canvas-mount:empty {
        display: none;
      }

      .battle-turn-queue {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        margin-top: 10px;
        padding: 8px;
        border: 1px solid rgba(35, 23, 13, 0.2);
        border-radius: 10px;
        background: rgba(255, 253, 245, 0.92);
      }

      .battle-queue-label {
        flex: 0 0 auto;
        font-weight: 700;
      }

      .battle-queue-items {
        display: flex;
        flex: 1 1 auto;
        gap: 6px;
        min-width: 0;
        overflow-x: auto;
        padding: 2px;
      }

      .battle-queue-item {
        display: grid;
        place-items: center;
        flex: 0 0 52px;
        width: 52px;
        height: 52px;
        border: 2px solid transparent;
        border-radius: 8px;
        background: rgba(106, 68, 39, 0.09);
      }

      .battle-queue-item.active {
        border-color: #c36e17;
        background: rgba(195, 110, 23, 0.22);
      }

      .visual-template-thumbnail {
        display: block;
        width: 48px;
        height: 48px;
        background-repeat: no-repeat;
      }

      .visual-template-thumbnail.fallback {
        display: grid;
        place-items: center;
        box-sizing: border-box;
        border: 2px solid var(--template-border);
        background: linear-gradient(to bottom, var(--template-fill) 0 64%, var(--template-accent) 64% 82%, var(--template-fill) 82%);
        color: var(--template-text);
        font-weight: 700;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .sprite-mapping-panel { max-height: calc(100vh - 64px); overflow: auto; }
      .mapping-warning { color: #8a1f11; font-weight: 700; }
      .sprite-mapping-panel button { margin: 4px; }
      .sprite-mapping-view-controls { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
      .sprite-mapping-view-controls output { min-width: 3.5rem; text-align: center; font-weight: 700; }
      [data-testid="sprite-mapping-selected"] label { display: inline-flex; align-items: center; gap: 4px; margin: 4px; }
      [data-testid="sprite-mapping-selected"] input { width: 5.5rem; padding: 6px; }
      [data-testid="sprite-mapping-selected"] .sprite-mapping-size-control { display: block; margin: 8px 4px; }
      [data-testid="sprite-mapping-selected"] .sprite-mapping-size-control input { display: block; box-sizing: border-box; width: 100%; max-width: none; padding: 0; }
      .sprite-mapping-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; margin-top: 12px; }
      .sprite-mapping-entry { width: 100%; min-height: 80px; padding: 6px; border-radius: 8px; text-align: left; display: flex; align-items: center; gap: 7px; }
      .sprite-mapping-entry span, [data-testid="sprite-mapping-selected"] span { display: block; font-size: .82rem; }
      .sprite-mapping-entry small { display: block; font-size: .75rem; }
      .sprite-mapping-preview { flex: 0 0 72px; width: 72px; height: 72px; border-radius: 5px; image-rendering: pixelated; }
      .sprite-mapping-entry.is-selected { outline: 3px solid #ffcf55; }
      .sprite-mapping-entry.is-invalid { background: #8a1f11; }
      [data-testid="sprite-mapping-selected"] { margin: 8px 0; padding: 8px; background: rgba(106,68,39,.1); }

      canvas {
        width: 100%;
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 10px;
        touch-action: none;
      }

      .sidebar {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .hud-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .hud-row span:last-child {
        text-align: right;
      }

      .ui-button {
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        background: #6a4427;
        color: #fffaf1;
        cursor: pointer;
        min-height: 44px;
        box-shadow: 0 3px 0 #402616, 0 5px 10px rgba(35, 23, 13, 0.22);
        transform: translateY(0);
        transition: transform 110ms ease, box-shadow 110ms ease, background-color 110ms ease, filter 110ms ease;
      }

      .ui-button:hover:not(:disabled) {
        background: #7b512e;
        box-shadow: 0 4px 0 #402616, 0 7px 13px rgba(35, 23, 13, 0.26);
        transform: translateY(-1px);
      }

      .ui-button:active:not(:disabled), .ui-button[aria-pressed="true"]:not(:disabled) {
        background: #56331e;
        box-shadow: 0 1px 0 #402616, 0 2px 4px rgba(35, 23, 13, 0.2);
        transform: translateY(2px);
      }

      .ui-button:focus-visible {
        outline: 3px solid #ffcf55;
        outline-offset: 3px;
      }

      .ui-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      .ui-button[aria-busy="true"] {
        opacity: 0.65;
        cursor: progress;
        filter: saturate(0.7);
      }

      .ui-button--secondary { background: #8f6f42; box-shadow: 0 3px 0 #5b4328, 0 5px 10px rgba(35, 23, 13, 0.18); }
      .ui-button--secondary:hover:not(:disabled) { background: #a18150; box-shadow: 0 4px 0 #5b4328, 0 7px 13px rgba(35, 23, 13, 0.22); }
      .ui-button--secondary:active:not(:disabled), .ui-button--secondary[aria-pressed="true"]:not(:disabled) { background: #755831; box-shadow: 0 1px 0 #5b4328, 0 2px 4px rgba(35, 23, 13, 0.18); }
      .ui-button--quiet { background: rgba(106, 68, 39, 0.12); color: #402616; box-shadow: 0 2px 0 rgba(64, 38, 22, 0.38); }
      .ui-button--icon { padding: 0; }
      .ui-button.is-selected { box-shadow: inset 0 0 0 3px #ffcf55, 0 3px 0 #402616, 0 5px 10px rgba(35, 23, 13, 0.22); }
      .ui-button.is-selected:focus-visible { outline-color: #fffaf1; outline-offset: 4px; }

      .overlay-box {
        border: 1px solid rgba(35, 23, 13, 0.2);
        border-radius: 10px;
        padding: 12px;
        background: rgba(255, 253, 245, 0.92);
      }

      .overlay-box + .overlay-box {
        margin-top: 8px;
      }

      .action-row {
        flex-wrap: wrap;
      }

      .action-row .ui-button {
        flex: 1 1 140px;
      }

      .menu-option {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        margin-top: 10px;
        text-align: left;
      }

      .control-tip {
        margin: 12px 0;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .queue-item {
        padding: 6px 8px;
        border-radius: 8px;
        margin-bottom: 6px;
        background: rgba(106, 68, 39, 0.09);
      }

      .queue-item.active {
        background: rgba(195, 110, 23, 0.22);
        font-weight: 700;
      }

      @media (max-width: 960px) {
        #app {
          grid-template-columns: 1fr;
          gap: 12px;
          padding: 12px;
        }

        .game-surface-panel {
          padding: 10px;
        }

        .game-canvas-row {
          gap: 6px;
        }

        .map-action-bar {
          width: 44px;
          justify-content: flex-start;
        }

        .map-action-icon {
          width: 40px;
          min-width: 40px;
          height: 40px;
          min-height: 40px;
        }

        .battle-turn-queue {
          align-items: flex-start;
          flex-direction: column;
          gap: 6px;
        }

        .battle-queue-items {
          width: 100%;
        }

        .sidebar {
          padding: 12px;
        }

        .hud-row {
          font-size: 0.96rem;
        }

        .ui-button {
          width: 100%;
        }

        .action-row .ui-button {
          flex-basis: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
