<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Map Loop</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top, #f7e6c6, transparent 45%),
          linear-gradient(180deg, #ceb27b 0%, #8f6f42 100%);
        color: #23170d;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 16px;
        max-width: 1280px;
        margin: 0 auto;
        padding: 16px;
        box-sizing: border-box;
        align-items: start;
        min-height: 100vh;
      }

      #app[data-layout-mode="mobile"] {
        grid-template-columns: 1fr;
      }

      #app[data-sidebar-placement="bottom"] .sidebar {
        order: 2;
      }

      .panel {
        border: 2px solid rgba(35, 23, 13, 0.25);
        background: rgba(255, 248, 230, 0.88);
        border-radius: 14px;
        box-shadow: 0 12px 32px rgba(35, 23, 13, 0.18);
      }

      .game-surface-panel {
        padding: 12px;
        min-width: 0;
        overflow: hidden;
      }

      .game-canvas-row {
        display: flex;
        align-items: stretch;
        gap: 8px;
        min-width: 0;
      }

      .game-canvas-row canvas {
        flex: 1 1 auto;
        min-width: 0;
      }

      .scene-action-mount {
        display: flex;
        flex: 0 0 auto;
      }

      .map-action-bar {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 48px;
      }

      .map-action-icon {
        width: 44px;
        min-width: 44px;
        height: 44px;
        min-height: 44px;
        padding: 0;
        font-size: 1.4rem;
        line-height: 1;
      }

      .scene-below-canvas-mount:empty {
        display: none;
      }

      .battle-turn-queue {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        margin-top: 10px;
        padding: 8px;
        border: 1px solid rgba(35, 23, 13, 0.2);
        border-radius: 10px;
        background: rgba(255, 253, 245, 0.92);
      }

      .battle-queue-label {
        flex: 0 0 auto;
        font-weight: 700;
      }

      .battle-queue-items {
        display: flex;
        flex: 1 1 auto;
        gap: 6px;
        min-width: 0;
        overflow-x: auto;
        padding: 2px;
      }

      .battle-queue-item {
        display: grid;
        place-items: center;
        flex: 0 0 52px;
        width: 52px;
        height: 52px;
        border: 2px solid transparent;
        border-radius: 8px;
        background: rgba(106, 68, 39, 0.09);
      }

      .battle-queue-item.active {
        border-color: #c36e17;
        background: rgba(195, 110, 23, 0.22);
      }

      .visual-template-thumbnail {
        display: block;
        width: 48px;
        height: 48px;
        background-repeat: no-repeat;
      }

      .visual-template-thumbnail.fallback {
        display: grid;
        place-items: center;
        box-sizing: border-box;
        border: 2px solid var(--template-border);
        background: linear-gradient(to bottom, var(--template-fill) 0 64%, var(--template-accent) 64% 82%, var(--template-fill) 82%);
        color: var(--template-text);
        font-weight: 700;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        width: 100%;
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 10px;
        touch-action: none;
      }

      .sidebar {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .hud-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .hud-row span:last-child {
        text-align: right;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        background: #6a4427;
        color: #fffaf1;
        cursor: pointer;
        min-height: 44px;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .overlay-box {
        border: 1px solid rgba(35, 23, 13, 0.2);
        border-radius: 10px;
        padding: 12px;
        background: rgba(255, 253, 245, 0.92);
      }

      .overlay-box + .overlay-box {
        margin-top: 8px;
      }

      .action-row {
        flex-wrap: wrap;
      }

      .action-row button {
        flex: 1 1 140px;
      }

      .menu-option {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        margin-top: 10px;
        text-align: left;
      }

      .control-tip {
        margin: 12px 0;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .secondary-button {
        background: #8f6f42;
      }

      .queue-item {
        padding: 6px 8px;
        border-radius: 8px;
        margin-bottom: 6px;
        background: rgba(106, 68, 39, 0.09);
      }

      .queue-item.active {
        background: rgba(195, 110, 23, 0.22);
        font-weight: 700;
      }

      @media (max-width: 960px) {
        #app {
          grid-template-columns: 1fr;
          gap: 12px;
          padding: 12px;
        }

        .game-surface-panel {
          padding: 10px;
        }

        .game-canvas-row {
          gap: 6px;
        }

        .map-action-bar {
          width: 44px;
          justify-content: flex-start;
        }

        .map-action-icon {
          width: 40px;
          min-width: 40px;
          height: 40px;
          min-height: 40px;
        }

        .battle-turn-queue {
          align-items: flex-start;
          flex-direction: column;
          gap: 6px;
        }

        .battle-queue-items {
          width: 100%;
        }

        .sidebar {
          padding: 12px;
        }

        .hud-row {
          font-size: 0.96rem;
        }

        button {
          width: 100%;
        }

        .action-row button {
          flex-basis: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
